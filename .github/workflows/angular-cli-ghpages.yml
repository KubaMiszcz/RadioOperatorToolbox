name: Deploy to GitHub Pages via angular-cli-ghpages

on:
  push:
    branches:
    - ymlupdate

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: radio-operator-toolbox-angular
    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Setup Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Update config.json
      run:
        echo "`jq '.build="$(date +\'%Y%m%d%H%m\')"' package.json`" > package.json

    - name: read package.json
      run:
        # cat package.json
        jq -r '.build' package.json
           
